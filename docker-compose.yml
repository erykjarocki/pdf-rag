services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - ./vector_db/qdrant:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - EMBED_MODEL=${EMBED_MODEL:-intfloat/multilingual-e5-small}
      - EMBED_DIM=${EMBED_DIM:-384}
      - CHUNK_SIZE=${CHUNK_SIZE:-384}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - TOP_K=${TOP_K:-8}
    depends_on:
      - qdrant
    restart: unless-stopped
