site_name: DOC-RAG
site_description: Local RAG system for PDF documents
repo_url: https://github.com/erykjarocki/doc-rag
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - API Reference: api-reference.md
  - Testing: testing.md
  - Improvements: improvements.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
