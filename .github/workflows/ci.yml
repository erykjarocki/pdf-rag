name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

permissions:
  pages: write
  id-token: write
  contents: write
  pull-requests: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
      - if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

  lint:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: |
          source .venv/bin/activate
          ruff check src/ tests/

  test-unit:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: |
          source .venv/bin/activate
          pytest tests/unit/ -v -m unit

  test-integration:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: |
          source .venv/bin/activate
          pytest tests/integration/ -v -m integration

  test-eval:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: |
          source .venv/bin/activate
          pytest tests/eval/ -v -m eval
      - name: Compare to baseline
        if: always()
        run: |
          source .venv/bin/activate
          python tests/eval/compare_to_baseline.py || echo "REGRESSION_DETECTED=true" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: |
            tests/eval/eval-report.html
            tests/eval/eval-report.json
            tests/eval/comparison.md
      - uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: tests/eval
          name: github-pages
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: eval-report
          path: tests/eval/comparison.md

  test-rerank:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: |
          source .venv/bin/activate
          pytest tests/eval/ -v -m rerank
      - name: Generate rerank comparison
        if: always()
        run: |
          source .venv/bin/activate
          python -c "
          import json
          from pathlib import Path
          data = json.loads(Path('tests/eval/eval-report.json').read_text())
          pc = data.get('pipeline_comparison')
          if pc and 'before' in pc and 'after' in pc:
              b, a = pc['before'], pc['after']
              lines = ['## Rerank Pipeline Comparison\n',
                       '| Metric | Bi-Encoder | +Rerank | Delta |',
                       '|--------|----------:|--------:|------:|']
              for k, l in [('recall_at_2','Recall@2'),('precision_at_2','Precision@2'),('mrr','MRR')]:
                  bv, av = b.get(k,0), a.get(k,0)
                  d = av - bv
                  sign = '+' if d > 0 else ''
                  lines.append(f'| {l} | {bv:.2f} | {av:.2f} | {sign}{d:.2f} |')
              Path('tests/eval/rerank-comparison.md').write_text('\n'.join(lines))
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rerank-report
          path: |
            tests/eval/eval-report.html
            tests/eval/eval-report.json
            tests/eval/rerank-comparison.md
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: rerank-report
          path: tests/eval/rerank-comparison.md

  deploy-report:
    needs: [test-eval, test-rerank]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: eval-report
          path: tests/eval
      - name: Update baseline
        run: cp tests/eval/eval-report.json tests/eval/eval-baseline.json
      - name: Commit baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/eval/eval-baseline.json
          git diff --cached --quiet || git commit -m "Update eval baseline [skip ci]"
          git push
      - id: deployment
        uses: actions/deploy-pages@v4
